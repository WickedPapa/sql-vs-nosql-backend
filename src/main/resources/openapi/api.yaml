openapi: 3.0.3

info:
  title: SQL vs NoSQL Backend
  version: 1.0.0
  description: Backend demo for comparing relational and NoSQL databases

servers:
  - url: http://localhost:8080

tags:
  - name: Users
    description: User management APIs
  - name: Products
    description: Product management APIs
  - name: Orders
    description: Order management APIs
  - name: Order Items
    description: APIs for managing order items
  - name: Stats
    description: Aggregation and reporting APIs

paths:

  /users:
    get:
      tags: [Users]
      summary: Get all users
      description: Returns the list of all users.
      operationId: getUsers
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'

    post:
      tags: [Users]
      summary: Create user
      description: Creates a new user.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user by id
      description: Returns the details of a user by id.
      operationId: getUserById
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found

    delete:
      tags: [Users]
      summary: Delete user by id
      description: Deletes a user by id.
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found

  /products:
    get:
      tags: [Products]
      summary: Get all products
      description: Returns the list of all products.
      operationId: getProducts
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'

    post:
      tags: [Products]
      summary: Create product
      description: Creates a new product.
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

  /products/{productId}:
    get:
      tags: [Products]
      summary: Get product by id
      description: Returns the details of a product by id.
      operationId: getProductById
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found

    put:
      tags: [Products]
      summary: Update product
      description: Updates the name and price of an existing product.
      operationId: updateProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found

    delete:
      tags: [Products]
      summary: Delete product by id
      description: Deletes a product by id.
      operationId: deleteProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Product deleted
        '404':
          description: Product not found

  /orders:
    get:
      tags: [Orders]
      summary: Get orders
      description: Returns all orders, optionally filtered by minimum total or product id.
      operationId: getOrders
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'

    post:
      tags: [Orders]
      summary: Create order
      description: Creates a new order for a user.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

  /orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get order by id
      description: Returns the details of an order by id.
      operationId: getOrderById
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found

    delete:
      tags: [Orders]
      summary: Delete order by id
      description: Deletes an order by id.
      operationId: deleteOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '204':
          description: Order deleted
        '404':
          description: Order not found

  /orders/user/{userId}:
    get:
      tags: [Orders]
      summary: Get orders by user id
      description: Returns all orders created by the specified user.
      operationId: getOrdersByUserId
      parameters:
        - $ref: '#/components/parameters/UserIdAsUserId'
      responses:
        '200':
          description: List of orders for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '404':
          description: User not found

