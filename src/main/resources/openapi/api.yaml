components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      description: User identifier
      schema:
        type: string
        format: uuid

    UserIdAsUserId:
      name: userId
      in: path
      required: true
      description: User identifier
      schema:
        type: string
        format: uuid

    ProductId:
      name: productId
      in: path
      required: true
      description: Product identifier
      schema:
        type: string
        format: uuid

    OrderId:
      name: orderId
      in: path
      required: true
      description: Order identifier
      schema:
        type: string
        format: uuid

    ItemId:
      name: itemId
      in: path
      required: true
      description: Order item identifier
      schema:
        type: string
        format: uuid

  schemas:

    UserRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
      properties:
        firstName:
          type: string
          description: User first name
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          description: User last name
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          description: User email
          minLength: 5
          maxLength: 255

    ProductRequest:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          description: Product name
          minLength: 1
          maxLength: 150
        price:
          type: number
          format: double
          description: Current product price
          minimum: 0

    OrderRequest:
      type: object
      required:
        - userId
        - items
      properties:
        userId:
          type: string
          format: uuid
          description: User identifier
        items:
          type: array
          description: List of items included in the order
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemRequest'

    OrderItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: string
          format: uuid
          description: Product identifier
        quantity:
          type: integer
          description: Quantity of the product
          minimum: 1

    OrderItemUpdateRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          description: Updated quantity
          minimum: 1

    UserResponse:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
      properties:
        id:
          type: string
          format: uuid
          description: User identifier
        firstName:
          type: string
          description: User first name
        lastName:
          type: string
          description: User last name
        email:
          type: string
          format: email
          description: User email

    ProductResponse:
      type: object
      required:
        - id
        - name
        - price
      properties:
        id:
          type: string
          format: uuid
          description: Product identifier
        name:
          type: string
          description: Product name
        price:
          type: number
          format: double
          description: Current product price

    OrderResponse:
      type: object
      required:
        - id
        - user
        - items
        - total
      properties:
        id:
          type: string
          format: uuid
          description: Order identifier
        user:
          $ref: '#/components/schemas/OrderUserResponse'
          description: User identifier
        items:
          type: array
          description: List of order items
          items:
            $ref: '#/components/schemas/OrderItemResponse'
        total:
          type: number
          format: double
          description: Total order amount
          minimum: 0

    OrderUserResponse:
      type: object
      required:
        - userId
        - firstName
        - lastName
        - email
      properties:
        userId:
          type: string
          format: uuid
          description: User identifier
        firstName:
          type: string
          description: User first name
        lastName:
          type: string
          description: User last name
        email:
          type: string
          format: email
          description: User email
          minimum: 0

    OrderItemResponse:
      type: object
      required:
        - productId
        - name
        - quantity
        - price
      properties:
        productId:
          type: string
          format: uuid
          description: Product identifier
        name:
          type: string
          description: Product name
        quantity:
          type: integer
          description: Quantity of the product
        price:
          type: number
          format: double
          description: Product price snapshot at order time
          minimum: 0

    TotalSpentPerUserResponse:
      type: object
      required:
        - userId
        - totalSpent
      properties:
        userId:
          type: string
          format: uuid
          description: User identifier
        totalSpent:
          type: number
          format: double
          description: Total amount spent by the user
          minimum: 0

    MostSoldProductResponse:
      type: object
      required:
        - productId
        - totalQuantity
      properties:
        productId:
          type: string
          format: uuid
          description: Product identifier
        totalQuantity:
          type: integer
          description: Total sold quantity
          minimum: 0