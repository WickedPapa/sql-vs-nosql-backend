credentials:
  postgres:
    username: postgres-admin
    password: postgres-psw
  mongo:
    password: mongo-psw

app:
  datasource: ${APP_DATASOURCE:POSTGRES}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/multi_persistence_backend_postgres_db
    username: ${credentials.postgres.username}
    password: ${credentials.postgres.password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    mongodb:
      uri: mongodb://mongo-admin:${credentials.mongo.password}@localhost:27017/multi_persistence_backend_mongo_db?authSource=admin
      uuid-representation: standard
      auto-index-creation: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
